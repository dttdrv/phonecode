name: Checks

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21
      - uses: android-actions/setup-android@v4
        with:
          packages: platform-tools platforms;android-37.0 build-tools;36.0.0
      - uses: gradle/actions/setup-gradle@v6
      - name: Verify vendored artifacts
        run: shasum -a 256 --check VENDORED_CHECKSUMS
      - name: Test and lint
        run: ./gradlew --no-daemon test lintDebug
